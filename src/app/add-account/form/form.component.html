<div [ngSwitch]="bankDetails.ID">
    <!-- Bank ID 1: Ajara Bank -->
    <app-ajara-form *ngSwitchCase="1" [APPLICANT_ID]="APPLICANT_ID" (pdfButtonLoading)="handlePdfLoading($event)">
    </app-ajara-form>

    <!-- Bank ID 2: Kumbhi Bank -->
    <app-kumbhi-form *ngSwitchCase="2" [APPLICANT_ID]="APPLICANT_ID" (pdfButtonLoading)="handlePdfLoading($event)">
    </app-kumbhi-form>

    <!-- Bank ID 3 or 5: Dada Bank -->
    <app-dada-form *ngSwitchCase="3" [APPLICANT_ID]="APPLICANT_ID" (pdfButtonLoading)="handlePdfLoading($event)">
    </app-dada-form>
    <app-dada-form *ngSwitchCase="5" [APPLICANT_ID]="APPLICANT_ID" (pdfButtonLoading)="handlePdfLoading($event)">
    </app-dada-form>

    <!-- Loading State or Default -->
    <div *ngSwitchDefault style="padding: 50px; text-align: center;">
        <nz-spin nzSimple nzTip="Loading Bank Specific Form..."></nz-spin>
    </div>
</div>
